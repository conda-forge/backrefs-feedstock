schema_version: 1

context:
  name: backrefs
  version: "7.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/backrefs-${{ version }}.tar.gz
  sha256: 4989bb9e1e99eb23647c7160ed51fb21d0b41b5d200f2d3017da41e023097e82

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - hatchling >=0.21.1
    - pip
    - python ${{ python_min }}.*
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - backrefs
      pip_check: true
      python_version: 
        - ${{ python_min }}.*
        - "*"

about:
  summary: A wrapper around re and regex that adds additional back references.
  license: MIT
  license_file: LICENSE.md
  homepage: https://github.com/facelessuser/backrefs

extra:
  recipe-maintainers:
    - asford
    - thewchan
